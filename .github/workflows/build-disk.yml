---
name: Build disk images

on:
  workflow_run:
    workflows: ["Build container image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      upload-to-webdav:
        description: "Upload to WebDAV"
        required: false
        default: false
        type: boolean
      platform:
        required: true
        type: choice
        options:
          - amd64
          - arm64
#  pull_request:
#    branches:
#      - main
  release:
    types: [published]
  push:
    branches:
      - main
    paths:
      - "./disk_config/disk.toml"
      - "./disk_config/iso-nvidia-open.toml"
      - "./disk_config/iso.toml"
      - "./disk_config/iso-deck.toml"
      - "./.github/workflows/build-disk.yml"

env:
  IMAGE_NAME: ${{ github.event.repository.name }} # output of build.yml, keep in sync
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}" # do not edit
  DEFAULT_TAG: "latest"
  BIB_IMAGE: "quay.io/centos-bootc/bootc-image-builder:latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build disk images
    runs-on: ${{ inputs.platform == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    # Only run if not triggered by workflow_run, OR if workflow_run was successful
    if: >
      github.event_name != 'workflow_run' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    strategy:
      fail-fast: false
      matrix:
        variant:
          - base: bazzite-nvidia-open
            name: freizzite-nvidia-open
            iso-config: ./disk_config/iso-nvidia-open.toml
          - base: bazzite
            name: freizzite
            iso-config: ./disk_config/iso.toml
          - base: bazzite-deck
            name: freizzite-deck
            iso-config: ./disk_config/iso-deck.toml
        disk-type: ["anaconda-iso"] # qcow2 disabled until disk space issues are resolved
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          USER_UID=$(id -u)
          USER_GID=$(id -g)
          # Concatenate the types with a hyphen
          DISK_TYPE=$(echo "${{ matrix.disk-type }}" | tr ' ' '-')
          # Lowercase the image uri
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${{ matrix.variant.name }}" >> ${GITHUB_ENV}
          echo "DISK_TYPE=${DISK_TYPE}" >> ${GITHUB_ENV}
          echo "USER_UID=${USER_UID}" >> ${GITHUB_ENV}
          echo "USER_GID=${USER_GID}" >> ${GITHUB_ENV}

      - name: Install dependencies
        if: inputs.platform == 'arm64'
        run: |
          set -x
          sudo apt update -y
          sudo apt install -y \
            podman

      - name: Maximize build space
        if: inputs.platform != 'arm64'
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Attempt to work around occassional timing issue of this running before containers are fully ready
      - name: Pre-pull container image
        run: |
          sudo podman pull ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }} || sleep 5m

      - name: Build iso disk images
        id: build
        uses: osbuild/bootc-image-builder-action@main
        with:
          builder-image: ${{ env.BIB_IMAGE }}
          config-file: ${{ matrix.disk-type == 'anaconda-iso' && matrix.variant.iso-config || './disk_config/disk.toml' }}
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          chown: ${{ env.USER_UID }}:${{ env.USER_GID }}
          types: ${{ matrix.disk-type }}
          additional-args: --rootfs btrfs --use-librepo=True

      - name: Rename ISO to variant name
        if: matrix.disk-type == 'anaconda-iso'
        run: |
          mkdir -p ${{ steps.build.outputs.output-directory }}/iso
          mv ${{ steps.build.outputs.output-directory }}/bootiso/install.iso \
             ${{ steps.build.outputs.output-directory }}/iso/${{ env.IMAGE_NAME }}.iso

      - name: Rename manifest to variant name
        if: matrix.disk-type == 'anaconda-iso'
        run: |
          mkdir -p ${{ steps.build.outputs.output-directory }}/iso
          # Find and rename the manifest file to match the ISO naming convention
          find ${{ steps.build.outputs.output-directory }} -name '*.manifest' -type f \
            -exec mv {} ${{ steps.build.outputs.output-directory }}/iso/${{ env.IMAGE_NAME }}.iso.manifest \;

      - name: Generate checksums
        if: matrix.disk-type == 'anaconda-iso'
        run: |
          mkdir -p ${{ steps.build.outputs.output-directory }}/iso
          cd ${{ steps.build.outputs.output-directory }}/iso
          # Generate SHA256 checksum (both file names)
          sha256sum *.iso > ${{ env.IMAGE_NAME }}.iso.sha256sum
          cp ${{ env.IMAGE_NAME }}.iso.sha256sum ${{ env.IMAGE_NAME }}.iso.shasum
          # Generate MD5 checksum
          md5sum *.iso > ${{ env.IMAGE_NAME }}.iso.md5sum

      - name: Upload disk images and Checksum to Job Artifacts
        # if: github.event_name != 'pull_request'
        if: inputs.upload-to-webdav != true && github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ steps.build.outputs.output-directory }}
          if-no-files-found: error
          retention-days: 0
          compression-level: 0
          overwrite: true

      - name: Upload to WebDAV
        if: inputs.upload-to-webdav == true && github.event_name != 'pull_request'
        shell: bash
        env:
          SOURCE_DIR: ${{ steps.build.outputs.output-directory }}
        run: |
          curl -sL https://rclone.org/install.sh | sudo bash
          OBSCURED_PASS=$(rclone obscure "${{ secrets.WEBDAV_PASSWORD }}")
          cd output
          echo "[webdav]
          type = webdav
          url = ${{ secrets.WEBDAV_URL }}
          vendor = fastmail
          user = ${{ secrets.WEBDAV_USERNAME }}
          pass = ${OBSCURED_PASS}" > rclone.conf
          pwd
          ls -l
          find . -ls
          rclone --config rclone.conf ls webdav:
          rclone --config rclone.conf ls webdav:${{ secrets.WEBDAV_PATH }}
          rclone --config rclone.conf sync ./iso webdav:${{ secrets.WEBDAV_PATH }}
